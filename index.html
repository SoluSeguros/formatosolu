<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Declaración de Siniestros – Soluasistencia</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b6b3a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Siniestros">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <img src="https://www.soluseguros.com.co/wp-content/uploads/2021/06/logo-solu.png"
       onerror="this.style.display='none'" alt="SoluSeguros">
  <h1>Declaración de Siniestros – Seguro de Vehículos</h1>
  <span id="saveStatus" class="save-status"></span>
  <div class="acciones">
    <button class="ghost" id="btnDrafts">📁 Borradores</button>
    <button class="ghost" id="btnPreview">👁 Vista previa</button>
    <button class="primary" id="btnSave">⬇ Generar PDF</button>
  </div>
</header>

<!-- Panel de borradores -->
<div class="modal" id="draftsModal">
  <div class="modal-box">
    <div class="modal-head">
      <h3>📁 Borradores guardados</h3>
      <button class="ghost" id="btnCloseDrafts">✕</button>
    </div>
    <div class="modal-tools">
      <button class="primary" id="btnNewDraft">➕ Nuevo borrador</button>
    </div>
    <div class="draft-list" id="draftList"></div>
  </div>
</div>

<div class="wrap">
  <div class="form-col">
    <form id="form"><!-- secciones generadas por JS --></form>
  </div>
  <div class="prev-col">
    <div class="pagenav">
      <button class="ghost" type="button" id="prevPg">◀</button>
      <span id="pgInfo" style="font-size:13px;color:#54607a">Pág. 1 / 2</span>
      <button class="ghost" type="button" id="nextPg">▶</button>
      <button class="ghost" type="button" id="btnRefresh">↻ Actualizar</button>
    </div>
    <div class="viewer" id="viewer">
      <p class="hint">Pulsa <b>Vista previa</b> para ver el formato relleno.</p>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="app.js"></script>
</body>
</html>
